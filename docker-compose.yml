services:
  db:
    image: postgres:16-alpine
    container_name: lmsbitlab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - lmsbitlab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lmsbitlab -d lmsbitlab" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lmsbitlab_pgdata: