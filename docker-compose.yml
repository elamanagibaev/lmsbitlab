services:
  db:
    image: postgres:16-alpine
    container_name: lmsbitlab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - lmsbitlab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lmsbitlab -d lmsbitlab" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: elamanagibaev/lmsbitlab:latest
    container_name: lmsbitlab_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_PORT: ${APP_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSLMODE: disable
    ports:
      - "${APP_PORT}:8080"

volumes:
  lmsbitlab_pgdata: